<!DOCTYPE html>

<html xmlns="http://www.w3.org/1999/xhtml" lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>My App</title>
    <link rel="stylesheet" href="./libs/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="./styles/style.css" />
</head>
<body>
    <!-- Header -->
    <header class="bg-light py-3 border-bottom">
        <div class="container">
            <div class="row align-items-center" id="header-content">

                <!-- Skeleton Logo -->
                <div class="col-auto">
                    <div class="skeleton-loading skeleton-logo"></div>
                </div>

                <!-- Skeleton Navigation -->
                <div class="col">
                    <div class="skeleton-loading skeleton-nav-item"></div>
                    <div class="skeleton-loading skeleton-nav-item"></div>
                    <div class="skeleton-loading skeleton-nav-item"></div>
                </div>

                <!-- Skeleton User Profile -->
                <div class="col-auto">
                    <div class="skeleton skeleton-avatar"></div>
                </div>

            </div>
        </div>
    </header>

    <!-- Main -->
    <div class="container">
        <h1>Calculation</h1>

        <input id="a" type="number" placeholder="A" />
        <input id="b" type="number" placeholder="B" />
        <input id="c" type="number" placeholder="C" />
        <input id="d" type="number" placeholder="D" />

        <button onclick="calculate()">Calculate</button>

        <pre id="result"></pre>
    </div>

    <footer class="fixed-bottom bg-light py-4 mt-auto">
        <div class="container">
            <div class="row">
                <div class="col-md-4 mb-3">
                    <!-- Adicione a classe 'skeleton-loading' -->
                    <div class="skeleton-loading skeleton-logo mb-2">
                        <p>Olá</p>
                    </div>
                    <div class="skeleton-loading skeleton-text w-75"></div>
                    <div class="skeleton-loading skeleton-text w-50"></div>
                </div>
            </div>
        </div>
    </footer>

    <script>
        // jQuery
        setTimeout(function () {
            $('.skeleton').css({
                'animation': 'none',
                '*': 'visibility: visible !important'
            });

            $('.skeleton-loading').removeClass('skeleton-loading');
        }, 3000);
    </script>

    <!-- start scripts -->
    <script src="libs/jquery/dist/jquery.min.js"></script>
    <script src="libs/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js" defer></script>
</body>
</html>
